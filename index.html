<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Щоденник</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --border: #e1e8ed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; font-weight: 600; color: #2c3e50; }

        /* Панель управління */
        .controls { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: center; }
        .btn { border: none; padding: 12px 20px; font-size: 16px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; margin: 5px; gap: 8px; }
        .btn-mic { background-color: var(--primary); color: white; width: 80%; max-width: 300px; font-size: 18px; box-shadow: 0 4px 10px rgba(74,144,226,0.3); }
        .btn-mic.recording { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .btn-export { background-color: #7f8c8d; color: white; font-size: 14px; }
        .btn-clear { background-color: #95a5a6; color: white; font-size: 14px; }

        /* Статус голосу */
        #voice-status { font-size: 14px; color: #7f8c8d; margin-top: 8px; min-height: 20px; font-style: italic; }

        /* Таблиця */
        .table-wrapper { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 500px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 15px; position: relative; }
        th { background-color: #f8f9fa; color: #34495e; font-weight: 600; }
        
        /* Кольорове кодування для Відчуття */
        .feel-plus { background-color: rgba(46, 204, 113, 0.15) !important; color: #27ae60; font-weight: bold; border-radius: 4px; padding: 2px 8px; }
        .feel-minus { background-color: rgba(231, 76, 60, 0.15) !important; color: #c0392b; font-weight: bold; border-radius: 4px; padding: 2px 8px; }
        .feel-pm { background-color: rgba(241, 196, 15, 0.15) !important; color: #d35400; font-weight: bold; border-radius: 4px; padding: 2px 8px; }

        /* Підсумковий рядок */
        .total-row { background-color: #eaeaea; font-weight: bold; color: #2c3e50; }
        .total-row td { border-top: 2px solid #bdc3c7; border-bottom: 2px solid #bdc3c7; }

        /* Редагування в таблиці */
        .editable { cursor: pointer; transition: background 0.1s; }
        .editable:hover { background-color: #f1f4f9; }
        .editable:hover::after { content: " ✎"; font-size: 11px; color: #95a5a6; position: absolute; right: 2px; top: 3px; }
        .edit-input { width: 90%; padding: 6px; border: 1px solid var(--primary); border-radius: 4px; text-align: center; font-size: 15px; }
        .edit-select { padding: 6px; border: 1px solid var(--primary); border-radius: 4px; font-size: 15px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 4px 15px rgba(231,76,60,0.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Щоденник</h2>

    <div class="controls">
        <button id="mic-btn" class="btn btn-mic">🎙 Натисни і говори</button>
        <div id="voice-status">Натисніть кнопку для голосового вводу...</div>
        
        <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;">
            <button id="export-csv" class="btn btn-export">⬇ Зберегти в Excel (CSV)</button>
            <button id="clear-btn" class="btn btn-clear">🗑 Очистити все</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="diary-table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Початок</th>
                    <th>Кінець</th>
                    <th>Відчуття</th>
                    <th>Об'єм (мл)</th>
                    <th>Вода (мл)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Дані генеруються динамічно -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Ініціалізація або завантаження даних
    let diaryData = JSON.parse(localStorage.getItem('bladder_diary_v2')) || [];

    // Налаштування розпізнавання мови (iOS Safari підтримує webkitSpeechRecognition)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'uk-UA';
        recognition.interimResults = false;
    }

    const micBtn = document.getElementById('mic-btn');
    const voiceStatus = document.getElementById('voice-status');

    if (!recognition) {
        voiceStatus.innerHTML = "❌ Голосовий ввід не підтримується цим браузером. Використовуй Safari на iPhone.";
        micBtn.style.display = 'none';
    } else {
        micBtn.addEventListener('click', () => {
            if (micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        recognition.onstart = () => {
            micBtn.classList.add('recording');
            micBtn.innerHTML = "🛑 Запис... Говори";
            voiceStatus.innerHTML = "Слухаю... Скажи, наприклад: 'Початок 9:00' або 'Кінець 9:45 плюс 200' чи 'Вода 500'";
        };

        recognition.onend = () => {
            micBtn.classList.remove('recording');
            micBtn.innerHTML = "🎙 Натисни і говори";
        };

        recognition.onerror = (event) => {
            voiceStatus.innerHTML = "Помилка розпізнавання: " + event.error;
        };

        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript.toLowerCase().trim();
            voiceStatus.innerHTML = `Почуто: "${resultText}"`;
            parseVoiceCommand(resultText);
        };
    }

    // Парсинг голосових команд
    function parseVoiceCommand(text) {
        // Очищення тексту для легшого парсингу чисел
        text = text.replace(/нуль нуль/g, '00')
                  .replace(/ плюс мінус| плюс-мінус| один один/g, ' ±')
                  .replace(/ плюс/g, ' +')
                  .replace(/ мінус/g, ' -');

        const today = new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'short' });

        // Команда 1: ПОЧАТОК (напр. "початок 9:00" або "початок 09 45")
        if (text.includes('початок')) {
            const timeMatch = text.match(/(\d{1,2})[\s:-]?(\d{2})/);
            if (timeMatch) {
                const hour = timeMatch[1].padStart(2, '0');
                const min = timeMatch[2];
                const newRow = {
                    date: today,
                    start: `${hour}:${min}`,
                    end: '',
                    feel: '',
                    volume: '',
                    water: ''
                };
                diaryData.push(newRow);
                saveAndRender();
                voiceStatus.innerHTML = `✅ Додано початок часу: ${hour}:${min}`;
                return;
            }
        }

        // Команда 2: КІНЕЦЬ (напр. "кінець 9:45 плюс 200")
        if (text.includes('кінець')) {
            if (diaryData.length === 0) {
                voiceStatus.innerHTML = "❌ Немає активного рядка. Спочатку скажіть 'Початок [час]'";
                return;
            }

            // Шукаємо останній рядок
            let lastRow = diaryData[diaryData.length - 1];
            
            // Витягуємо час кінця
            const timeMatch = text.match(/(\d{1,2})[\s:-]?(\d{2})/);
            if (timeMatch) {
                const hour = timeMatch[1].padStart(2, '0');
                const min = timeMatch[2];
                lastRow.end = `${hour}:${min}`;
            }

            // Витягуємо відчуття
            if (text.includes('+')) lastRow.feel = '+';
            else if (text.includes('-')) lastRow.feel = '-';
            else if (text.includes('±') || text.includes('+-')) lastRow.feel = '±';

            // Витягуємо об'єм (шукаємо число після слова плюс/мінус або в кінці тексту)
            const volMatch = text.match(/(?:\+|-|±|\s)(\d{3,4})\b/);
            if (volMatch) {
                lastRow.volume = parseInt(volMatch[1]);
            } else {
                // Спроба знайти будь-яке число більше 30, що йде після часу
                const allNumbers = text.match(/\d+/g);
                if (allNumbers && allNumbers.length >= 3) {
                    lastRow.volume = parseInt(allNumbers[allNumbers.length - 1]);
                }
            }

            saveAndRender();
            voiceStatus.innerHTML = `✅ Оновлено кінець: ${lastRow.end || ''}, відч: ${lastRow.feel || ''}, об'єм: ${lastRow.volume || ''}`;
            return;
        }

        // Команда 3: ВОДА (напр. "вода 500")
        if (text.includes('вода')) {
            const waterMatch = text.match(/\d+/);
            if (waterMatch && diaryData.length > 0) {
                let lastRow = diaryData[diaryData.length - 1];
                lastRow.water = parseInt(waterMatch[0]);
                saveAndRender();
                voiceStatus.innerHTML = `✅ Додано воду: ${waterMatch[0]} мл в останній рядок.`;
                return;
            } else if (diaryData.length === 0) {
                // Створюємо порожній рядок суто під воду, якщо таблиця пуста
                diaryData.push({ date: today, start: '', end: '', feel: '', volume: '', water: parseInt(waterMatch[0]) });
                saveAndRender();
                return;
            }
        }

        voiceStatus.innerHTML = "⚠️ Не вдалося розпізнати команду. Спробуйте чіткіше.";
    }

    // Функція збереження і відображення даних
    function saveAndRender() {
        localStorage.setItem('bladder_diary_v2', JSON.stringify(diaryData));
        renderTable();
    }

    // Відображення таблиці з групуванням по днях та авто-підсумками
    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (diaryData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="color:#7f8c8d; padding:20px;">Таблиця порожня. Додайте дані голосом або через клік на ячейку.</td></tr>`;
            return;
        }

        // Групуємо записи за датами для підрахунку сум за день
        let currentStaticDate = "";
        let dailyVolSum = 0;
        let dailyWaterSum = 0;

        diaryData.forEach((row, index) => {
            // Перевіряємо, чи це початок нового дня
            let showDate = "";
            if (row.date !== currentStaticDate) {
                // Якщо це не перший день у списку, виводимо підсумок для ПОПЕРЕДНЬОГО дня перед тим як почати новий
                if (currentStaticDate !== "") {
                    appendTotalRow(tbody, dailyVolSum, dailyWaterSum);
                }
                // Скидаємо лічильники для нового дня
                currentStaticDate = row.date;
                showDate = currentStaticDate;
                dailyVolSum = 0;
                dailyWaterSum = 0;
            }

            // Додаємо суми за поточний день
            dailyVolSum += parseInt(row.volume) || 0;
            dailyWaterSum += parseInt(row.water) || 0;

            const tr = document.createElement('tr');

            // Класи стилізації для Відчуття
            let feelClass = '';
            if (row.feel === '+') feelClass = 'feel-plus';
            if (row.feel === '-') feelClass = 'feel-minus';
            if (row.feel === '±' || row.feel === '+-') feelClass = 'feel-pm';

            tr.innerHTML = `
                <td class="editable" data-index="${index}" data-field="date">${showDate}</td>
                <td class="editable" data-index="${index}" data-field="start">${row.start || ''}</td>
                <td class="editable" data-index="${index}" data-field="end">${row.end || ''}</td>
                <td class="editable" data-index="${index}" data-field="feel"><span class="${feelClass}">${row.feel || ''}</span></td>
                <td class="editable" data-index="${index}" data-field="volume">${row.volume || ''}</td>
                <td class="editable" data-index="${index}" data-field="water">${row.water || ''}</td>
            `;

            tbody.appendChild(tr);
        });

        // Виводимо підсумок для НАЙОСТАННІШОГО дня в таблиці
        appendTotalRow(tbody, dailyVolSum, dailyWaterSum);

        // Навішуємо події кліку на комірки для ручного редагування
        setupInlineEditing();
    }

    function appendTotalRow(tbody, vol, water) {
        const tr = document.createElement('tr');
        tr.className = 'total-row';
        tr.innerHTML = `
            <td colspan="4" style="text-align:right; padding-right:15px;">Підсумок за день:</td>
            <td>${vol > 0 ? vol + ' мл' : '0'}</td>
            <td>${water > 0 ? water + ' мл' : '0'}</td>
        `;
        tbody.appendChild(tr);
    }

    // Налаштування швидкого редагування в таблиці
    function setupInlineEditing() {
        document.querySelectorAll('.editable').forEach(cell => {
            cell.addEventListener('click', function() {
                if (this.querySelector('input') || this.querySelector('select')) return;

                const index = this.getAttribute('data-index');
                const field = this.getAttribute('data-field');
                const oldValue = diaryData[index][field] || '';

                if (field === 'feel') {
                    // Випадаючий список для відчуттів
                    const select = document.createElement('select');
                    select.className = 'edit-select';
                    ['', '+', '-', '±'].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt || '---';
                        if (opt === oldValue) option.selected = true;
                        select.appendChild(option);
                    });

                    this.innerHTML = '';
                    this.appendChild(select);
                    select.focus();

                    select.addEventListener('blur', () => {
                        diaryData[index][field] = select.value;
                        saveAndRender();
                    });
                    select.addEventListener('change', () => {
                        diaryData[index][field] = select.value;
                        saveAndRender();
                    });
                } else {
                    // Текстове поле для інших комірок
                    const input = document.createElement('input');
                    input.type = (field === 'volume' || field === 'water') ? 'number' : 'text';
                    input.className = 'edit-input';
                    input.value = oldValue;

                    this.innerHTML = '';
                    this.appendChild(input);
                    input.focus();

                    input.addEventListener('blur', () => {
                        diaryData[index][field] = input.value;
                        saveAndRender();
                    });

                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            diaryData[index][field] = input.value;
                            saveAndRender();
                        }
                        if (e.key === 'Escape') {
                            saveAndRender(); // скасувати
                        }
                    });
                }
            });
        });
    }

    // Очищення даних
    document.getElementById('clear-btn').addEventListener('click', () => {
        if (confirm('Ви впевнені, що хочете очистити ВCI дані таблиці?')) {
            diaryData = [];
            saveAndRender();
        }
    });

    // Експорт у формат CSV (відкривається в Excel)
    document.getElementById('export-csv').addEventListener('click', () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "Дата,Початок,Кінець,Відчуття,Об'єм (мл),Вода (мл)\n";

        diaryData.forEach(row => {
            csvContent += `${row.date || ''},${row.start || ''},${row.end || ''},${row.feel || ''},${row.volume || ''},${row.water || ''}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `bladder_diary_${new Date().toLocaleDateString('uk-UA')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    // Перший запуск
    renderTable();
</script>

</body>
</html>
